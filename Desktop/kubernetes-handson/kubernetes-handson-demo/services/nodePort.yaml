---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  labels:
    app: myapp
spec:
  type: NodePort
  ports:
    - targetPort: 80    # pod/container/target port
      port: 80          # service port
      nodePort: 30008    # port on node
  selector:
#   matchLabels:        no need to write matchLabels as (replicaset, deployment), simply specify pods-labels(parameters)
#     app: myapp
#     tier: front-end
    app: myapp
    tier: front-end
 
 
    # kubectl create/apply -f filename/ service.yaml  -create svc
    # kubectl get svc - list svc
    # curl http://nodeIP:nodePort to access the svc (web server)
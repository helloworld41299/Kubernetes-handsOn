---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-vote
  labels:
    app: vote
    tier: front-end
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vote
      tier: front-end
  template:
    metadata:
      name: vote               #myapp-vote
      labels:
        app: vote
        tier: front-end
    spec:
      containers:
        - name: vote
          image: dockersamples/examplevotingapp_result
          ports:
            - containerPort: 80         #targetPort
              name: vote
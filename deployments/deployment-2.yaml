---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-replicaset
  labels:     # labels: app, type, env
    app: myapp
    type: front-end
spec:
  selector:
    matchLabels:
      env: Production   # spec(Selector.matchLabels == Pod.labels) does not care matching with above rs, Deployments, service etc metadata(labels).
  template:
    metadata:
      name: nginx-2
      labels:      
        env: Production
    spec:
      containers:
        - name: nginx
          image: nginx